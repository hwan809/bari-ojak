<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentBari & Ojak: The Vibe Coding OS Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fira Sans', sans-serif; background-color: #0F172A; color: #F8FAFC; }
        .code-font { font-family: 'Fira Code', monospace; }
        .primary-bg { background-color: #1E293B; }
        .secondary-bg { background-color: #334155; }
        .accent-green { color: #22C55E; }
        .accent-red { color: #EF4444; }
        .accent-blue { color: #3B82F6; }
        .accent-amber { color: #F59E0B; }
        .fade-in { animation: fadeIn 0.5s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom scrollbar for terminals */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">

    <header class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-bold mb-2 code-font"><span class="accent-blue">AgentBari</span> & <span class="accent-amber">Ojak</span> OS</h1>
        <p class="text-slate-400">Multi-Agent Conflict Resolution & Dynamic MCP Orchestration</p>
    </header>

    <div class="flex items-center justify-center mb-6">
        <button id="start-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition-colors duration-200 uppercase tracking-widest text-sm shadow-lg border border-blue-500 cursor-pointer">Start Simulation</button>
    </div>

    <!-- Main Dashboard Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-grow max-w-7xl mx-auto w-full">
        
        <!-- Agent 1 Panel -->
        <div class="primary-bg rounded-lg border border-slate-700 flex flex-col shadow-xl overflow-hidden relative" id="agent1-card">
            <div class="bg-slate-800 px-4 py-3 border-b border-slate-700 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-slate-500" id="a1-status-dot"></div>
                    <h2 class="font-semibold text-lg">Agent 1</h2>
                </div>
                <span class="text-xs px-2 py-1 bg-slate-700 rounded text-slate-300 pointer-events-none code-font" id="a1-task">Idle</span>
            </div>
            <div class="p-4 flex-grow overflow-y-auto max-h-96 code-font text-sm whitespace-pre-wrap" id="agent1-log">Waiting for task...</div>
        </div>

        <!-- AgentBari & Ojak Control Center -->
        <div class="flex flex-col gap-6">
            <!-- AgentBari -->
            <div class="primary-bg rounded-lg border border-blue-900 flex flex-col shadow-xl overflow-hidden relative flex-1">
                <div class="bg-blue-900/40 px-4 py-3 border-b border-blue-800 flex justify-between items-center">
                    <h2 class="font-semibold text-lg accent-blue">AgentBari Control</h2>
                    <span class="text-xs px-2 py-1 bg-blue-900 rounded text-blue-300">AST Lock Manager</span>
                </div>
                <div class="p-4 flex-grow overflow-y-auto min-h-32 code-font text-xs text-slate-300 space-y-2" id="bari-log">
                    <div class="opacity-50">[System] Real-time SDG active.</div>
                </div>
            </div>

            <!-- Ojak -->
            <div class="primary-bg rounded-lg border border-amber-900 flex flex-col shadow-xl overflow-hidden relative flex-1">
                <div class="bg-amber-900/40 px-4 py-3 border-b border-amber-800 flex justify-between items-center">
                    <h2 class="font-semibold text-lg accent-amber">Ojak Middleware</h2>
                    <span class="text-xs px-2 py-1 bg-amber-900 rounded text-amber-300">Dynamic MCP</span>
                </div>
                <div class="p-4 flex-grow overflow-y-auto min-h-32 code-font text-xs text-slate-300 space-y-2" id="ojak-log">
                    <div class="opacity-50">[Registry] Standing by for tool requests.</div>
                </div>
            </div>
        </div>

        <!-- Agent 2 Panel -->
        <div class="primary-bg rounded-lg border border-slate-700 flex flex-col shadow-xl overflow-hidden relative" id="agent2-card">
            <div class="bg-slate-800 px-4 py-3 border-b border-slate-700 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-slate-500" id="a2-status-dot"></div>
                    <h2 class="font-semibold text-lg">Agent 2</h2>
                </div>
                <span class="text-xs px-2 py-1 bg-slate-700 rounded text-slate-300 pointer-events-none code-font" id="a2-task">Idle</span>
            </div>
            <div class="p-4 flex-grow overflow-y-auto max-h-96 code-font text-sm whitespace-pre-wrap" id="agent2-log">Waiting for task...</div>
        </div>

    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const a1Log = document.getElementById('agent1-log');
        const a2Log = document.getElementById('agent2-log');
        const bariLog = document.getElementById('bari-log');
        const ojakLog = document.getElementById('ojak-log');

        const appendLog = (el, msg, colorClass = '') => {
            const div = document.createElement('div');
            div.className = `fade-in mb-1 ${colorClass}`;
            div.innerHTML = `> ${msg}`;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        };

        const updateStatus = (agentId, taskName, colorClass) => {
            document.getElementById(`${agentId}-status-dot`).className = `w-3 h-3 rounded-full ${colorClass}`;
            document.getElementById(`${agentId}-task`).innerText = taskName;
            document.getElementById(`${agentId === 'a1' ? 'agent1-card' : 'agent2-card'}`).className = `primary-bg rounded-lg border ${colorClass.includes('green') ? 'border-green-500' : (colorClass.includes('red') ? 'border-red-500' : 'border-slate-700')} flex flex-col shadow-xl overflow-hidden relative transition-colors duration-300`;
        };

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            startBtn.classList.add('opacity-50', 'cursor-not-allowed');
            
            // Initial clear
            [a1Log, a2Log, bariLog, ojakLog].forEach(el => el.innerHTML = '');

            appendLog(a1Log, "Requesting OrderProcessing backend module...");
            appendLog(a2Log, "Requesting PaymentGateway service...");
            
            updateStatus('a1', 'Planning Intent', 'bg-blue-400');
            updateStatus('a2', 'Planning Intent', 'bg-blue-400');
            
            await sleep(1500);
            
            // Intent send
            appendLog(a1Log, "Sending Intent Payload to AgentBari...", "text-blue-400");
            appendLog(a2Log, "Sending Intent Payload to AgentBari...", "text-blue-400");

            await sleep(1000);

            // Bari intercepts
            appendLog(bariLog, "Received Intent from Agent 1: target=OrderService", "text-slate-300");
            appendLog(bariLog, "Received Intent from Agent 2: target=PaymentGateway, dependencies=[OrderService]", "text-slate-300");
            
            await sleep(1000);

            appendLog(bariLog, "🔥 COLLISION DETECTED on AST Node: OrderService", "accent-red font-bold");
            
            await sleep(800);

            appendLog(bariLog, "🔒 Assigning Write Lock for 'OrderService' to Agent 1...", "accent-green");
            appendLog(bariLog, "⚠️ Sending Soft Interrupt (YIELD) to Agent 2...", "accent-amber");

            await sleep(800);

            // Agent 1 starts
            updateStatus('a1', 'Building OrderService', 'bg-green-500');
            appendLog(a1Log, "Lock acquired. Generating schema.prisma...", "accent-green");

            // Agent 2 pivots
            updateStatus('a2', 'Pivoting to UI', 'bg-amber-500');
            appendLog(a2Log, "Received YIELD signal for OrderService.", "accent-amber");
            appendLog(a2Log, "Context switch: Commencing independent Payment UI component development.", "text-slate-300");

            await sleep(2000);

            // Agent 1 hits an obstacle
            updateStatus('a1', 'BLOCKED', 'bg-red-500');
            appendLog(a1Log, "ERROR: Attempting to integrate Stripe payment API...", "accent-red");
            appendLog(a1Log, "APINotFoundException: Stripe MCP tool not injected in static context.", "accent-red");
            
            await sleep(1500);

            // Agent 1 talks to Ojak
            appendLog(a1Log, "Querying Ojak Registry: 'Require Stripe payment intent capabilities'", "text-amber-400");
            
            await sleep(1000);

            // Ojak processes
            appendLog(ojakLog, "Query received from Agent 1.", "text-slate-300");
            appendLog(ojakLog, "🔍 Vector Search: matched 'stripe-enterprise-mcp' with 0.98 accuracy.", "text-blue-400");
            
            await sleep(1000);

            appendLog(ojakLog, "Validating Zero-Trust constraints...", "text-slate-300");
            appendLog(ojakLog, "✅ Passing OpenAPI schema to Sandbox.", "accent-green");
            appendLog(ojakLog, "⚡ Hot-Swapping Stripe MCP schema into Agent 1 context window.", "font-bold text-amber-500");

            await sleep(1500);

            // Agent 1 continues
            updateStatus('a1', 'Integrating Stripe', 'bg-green-500');
            appendLog(a1Log, "Stripe tool dynamically injected! Resuming generation...", "accent-green");
            appendLog(a1Log, "const intent = await stripe.createPaymentIntent({...})", "text-slate-400");

            await sleep(2000);

            // Agent 1 commits
            updateStatus('a1', 'Committing', 'bg-blue-400');
            appendLog(a1Log, "OrderService and schema generation complete. Committing to repo.", "text-slate-300");
            
            await sleep(1000);

            // Bari unlocks
            appendLog(bariLog, "Commit detected. 🔓 Releasing lock on OrderService.", "accent-green");
            appendLog(bariLog, "📡 Broadcasting `SchemaUpdated` payload to Swarm.", "text-blue-400");

            await sleep(1000);

            // Ojak garbage collects
            appendLog(ojakLog, "Task complete. Revoking Stripe MCP token and scrubbing context.", "text-slate-500");

            await sleep(1000);

            // Agent 2 resumes
            updateStatus('a2', 'Building Gateway', 'bg-green-500');
            appendLog(a2Log, "Received `SchemaUpdated` event via Pub/Sub.", "text-blue-400");
            appendLog(a2Log, "Real-time context injection: Updating memory with latest Order schema.", "accent-green");
            appendLog(a2Log, "Resuming PaymentGateway backend logic generation using valid schema...", "text-slate-300");
            appendLog(a2Log, "No manual merge required. Sync complete.", "accent-green");

            await sleep(1500);
            updateStatus('a1', 'Done', 'bg-slate-500');
            updateStatus('a2', 'Done', 'bg-slate-500');
            startBtn.disabled = false;
            startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            startBtn.innerText = "Re-run Simulation";
        });
    </script>
</body>
</html>
